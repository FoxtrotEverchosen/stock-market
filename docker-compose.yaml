services:
  redis:
    image: redis:7-alpine
    restart: always

  app1:
    build: ./app
    restart: always
    environment:
      - REDIS_URL=redis://redis:6379
      - PORT=8080
    depends_on:
      - redis

  app2:
    build: ./app
    restart: always
    environment:
      - REDIS_URL=redis://redis:6379
      - PORT=8080
    depends_on:
      - redis

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "${PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2